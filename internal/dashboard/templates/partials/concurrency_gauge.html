{{define "concurrency_gauge"}}
<div class="concurrency-gauge">
    <div class="gauge-label">Concurrency</div>
    <div class="gauge-bar">
        <div class="gauge-fill" style="width: {{pct .RunningAgents .MaxConcurrent}}%"></div>
    </div>
    <div class="gauge-text">{{.RunningAgents}} / {{.MaxConcurrent}} agents</div>
    <div class="gauge-sub">{{.ActivePipelines}} active pipelines</div>
</div>
{{end}}

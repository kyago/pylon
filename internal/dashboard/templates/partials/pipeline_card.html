{{define "pipeline_card"}}
<div class="pipeline-card {{if .IsActive}}pipeline-active{{else if eq .CurrentStage "completed"}}pipeline-completed{{else}}pipeline-failed{{end}}">
    <div class="pipeline-card-header">
        <a href="/pipelines/{{.ID}}" hx-get="/pipelines/{{.ID}}" hx-target="#main" hx-push-url="true" class="pipeline-id">
            {{truncate .ID 12}}
        </a>
        <span class="badge {{if .IsActive}}badge-active{{else if eq .CurrentStage "completed"}}badge-completed{{else}}badge-failed{{end}}">
            {{stageLabel .CurrentStage}}
        </span>
    </div>
    <div class="stage-bar-mini">
        {{$idx := stageIndex .CurrentStage}}
        {{$total := .TotalStages}}
        {{range $i, $s := allStages}}
        <div class="stage-dot {{if lt $i $idx}}stage-done{{else if eq $i $idx}}stage-current{{end}} {{if eq (printf "%s" $s) "failed"}}stage-failed-dot{{end}}"></div>
        {{end}}
    </div>
    {{if .TaskSpec}}
    <div class="pipeline-task">{{truncate .TaskSpec 80}}</div>
    {{end}}
    <div class="pipeline-card-footer">
        <span class="agent-count">{{len .Agents}} agents</span>
        <span class="pipeline-time">{{timeAgo .UpdatedAt}}</span>
    </div>
</div>
{{end}}

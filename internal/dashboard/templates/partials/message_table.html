{{define "message_table"}}
<table class="table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Type</th>
            <th>From</th>
            <th>To</th>
            <th>Status</th>
            <th>Priority</th>
            <th>Subject</th>
            <th>Created</th>
        </tr>
    </thead>
    <tbody>
        {{range .Messages}}
        <tr>
            <td class="mono">{{truncate .ID 8}}</td>
            <td><span class="badge badge-sm">{{.Type}}</span></td>
            <td>{{.FromAgent}}</td>
            <td>{{.ToAgent}}</td>
            <td>
                <span class="badge badge-sm {{if eq .Status "queued"}}badge-active{{else if eq .Status "acked"}}badge-completed{{else if eq .Status "failed"}}badge-failed{{end}}">
                    {{.Status}}
                </span>
            </td>
            <td>{{.Priority}}</td>
            <td>{{truncate .Subject 30}}</td>
            <td>{{timeAgo .CreatedAt}}</td>
        </tr>
        {{end}}
        {{if not .Messages}}
        <tr><td colspan="8" class="empty-cell">No messages</td></tr>
        {{end}}
    </tbody>
</table>
{{end}}

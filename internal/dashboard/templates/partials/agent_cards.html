{{define "agent_cards"}}
<div class="agent-grid">
    {{range $name, $agent := .Agents}}
    <div class="agent-card {{statusClass $agent.Status}}">
        <div class="agent-name">{{$name}}</div>
        <div class="agent-status">
            <span class="status-dot {{statusClass $agent.Status}}"></span>
            {{$agent.Status}}
        </div>
        {{if $agent.TaskID}}
        <div class="agent-task">Task: {{truncate $agent.TaskID 16}}</div>
        {{end}}
    </div>
    {{end}}
</div>
{{end}}

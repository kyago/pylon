{{define "head"}}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pylon{{if workspaceName}} — {{workspaceName}}{{end}}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/htmx.min.js"></script>
    <script src="/static/htmx-sse.js"></script>
</head>
{{end}}

{{define "nav"}}
<nav class="navbar">

    <div class="nav-links">
        <a href="/" hx-get="/" hx-target="#main" hx-push-url="true" class="nav-link">Overview</a>
        <a href="/messages" hx-get="/messages" hx-target="#main" hx-push-url="true" class="nav-link">Messages</a>
        <a href="/memory" hx-get="/memory" hx-target="#main" hx-push-url="true" class="nav-link">Memory</a>
